  shy:
    name: "害羞"
    expression: "blushing, looking away, shy expression, slightly embarrassed"
    background: "soft lighting, indoor setting, gentle atmosphere"
  angry:
    name: "生气"
    expression: "frowning, angry expression, intense gaze, frustrated"
    background: "dramatic lighting, dark background, intense atmosphere"
  smug:
    name: "得意"
    expression: "smug smile, confident expression, proud look, self-satisfied"
