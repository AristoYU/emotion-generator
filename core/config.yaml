# 基础 prompt 模板
prompt_templates:
  positive_base: "masterpiece, best quality, highres, detailed, {clothing}, expressing {emotion} emotion, beautiful lighting, sharp focus"
  negative: "lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry, bad proportions, disfigured, mutation, deformed"

# 情绪描述词映射
emotion_descriptions:
  happy: "joyful, smiling, bright eyes, cheerful atmosphere"
  sad: "tearful, downcast eyes, melancholic, somber mood"
  angry: "furious, intense gaze, aggressive posture, tense atmosphere"
  calm: "serene, peaceful expression, relaxed posture, tranquil setting"
  excited: "enthusiastic, wide eyes, dynamic pose, energetic vibe"
  fearful: "terrified, wide fearful eyes, defensive posture, dark atmosphere"
